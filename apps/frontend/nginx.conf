# ─────────────────────────────────────────────────────────────────────────────
#  Vega · nginx que sirve la PWA (se instala en /etc/nginx/conf.d/default.conf)
#
#  Sólo estáticos. TLS, HSTS y el enrutado de dominios son responsabilidad del
#  proxy inverso de delante (nginx/Plesk/Traefik) — ver deploy/README.md.
#
#  Nota sobre `add_header`: en nginx, un `add_header` dentro de un location
#  ANULA todos los heredados del bloque padre. Por eso las cabeceras de
#  seguridad se repiten en cada location que añade las suyas; no es duplicación
#  gratuita, es la única forma de que no desaparezcan.
# ─────────────────────────────────────────────────────────────────────────────

server {
    # 8080 y no 80: el contenedor corre como usuario `nginx`, sin privilegios
    # para abrir puertos por debajo de 1024.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    # ── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/xml
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    # Si el build deja ficheros .gz junto a los originales, se sirven tal cual
    # sin gastar CPU en comprimir en caliente.
    gzip_static on;

    # ── Sonda de salud para el proxy inverso ────────────────────────────────
    # Se responde desde memoria: no depende de que el build haya generado el
    # fichero, y no ensucia el access log con el polling del balanceador.
    location = /health.txt {
        access_log off;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    # ── Service worker y manifiesto: NUNCA cacheados ────────────────────────
    # Va antes que el bloque de assets porque sw.js también acaba en .js y en
    # nginx gana el primer regex que casa. Si el navegador cachea el service
    # worker, los usuarios se quedan clavados en una versión vieja de la PWA.
    location ~* ^/(?:sw|service-worker|registerSW|workbox-[^/]+)\.js$ {
        # Sólo `add_header` y nunca `expires`: usar los dos haría que nginx
        # emitiera dos cabeceras Cache-Control distintas en la misma respuesta.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    location ~* \.(?:webmanifest|json)$ {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # ── Assets con hash en el nombre: caché agresiva e inmutable ────────────
    # Vite emite /assets/app-4f9c1a2b.js; el hash cambia con el contenido, así
    # que un año de caché es seguro y elimina revalidaciones en móvil.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|avif|ico|map|wasm)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # ── Fallback SPA ────────────────────────────────────────────────────────
    # Cualquier ruta del router de React devuelve index.html. El HTML no se
    # cachea: es quien apunta a los assets con hash nuevos tras cada despliegue.
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache, must-revalidate" always;

        # Cabeceras de seguridad básicas. HSTS se pone en el proxy inverso, que
        # es quien termina TLS y conoce el dominio real.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        # CSP pensada para React + KaTeX + visor PDF:
        #   · 'unsafe-inline' en style-src es inevitable con KaTeX/Tailwind JIT.
        #   · blob: en worker-src/frame-src lo necesita pdf.js.
        #   · connect-src 'self' basta porque el proxy inverso publica la API
        #     bajo el mismo origen (/api). Si la sirves en otro dominio, añádelo.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    # ── Ruido innecesario ───────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    # Ficheros ocultos, salvo /.well-known (por si algún día el propio
    # contenedor tuviera que responder a un reto ACME o a un deep link).
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }

    # ── Opcional: publicar la API bajo el mismo origen ──────────────────────
    # Descomenta si prefieres que el proxy inverso apunte SÓLO al contenedor
    # web y sea nginx quien reenvíe /api al contenedor api. Ahorra un vhost y
    # elimina el CORS, a cambio de meter el tráfico de la API por este salto.
    #
    # location /api/ {
    #     proxy_pass         http://api:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 120s;   # las correcciones con IA tardan
    # }
}
